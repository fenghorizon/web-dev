<!DOCTYPE html>
<html>
<head>
  <title>CSS Align example</title>
  <style>
    body{
      font-family: Arial;
    }

    .box{
      border: 1px solid black;
      margin: 10px;
      padding: 15px;
      background-color: olive;
    }
    .a{
      text-align: left; /* zuun tiish*/
    }
    .b{
      text-align: center; /* gold/tuvd */
    }
    .c{
      text-align: right; /* baruun tiish */
    }
    .d{
      text-align: justify; /* hoyr talruu jigd */
    }
  </style>
</head>
<body>

  <div class="box a">left</div>
  <div class="box b">center</div>
  <div class="box c">right</div>
  <div class="box d">ene muriig urt bicvel hoyr talruugaa jigd tarj haragdana</div>

</body>
</html>
