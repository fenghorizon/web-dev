<!DOCTYPE html>
<html>
<head>
  <title>CSS Padding example</title>
  <style>
    body{
      font-family: Arial;
    }
    .box{
      border: 2px solid black;
      margin: 10px;
      background-color: lightgray;
    }
    .a{
      padding: 20px; /*1 utga bvl -> buh tal*/

    }.b{
      padding: 10px 30px; /*2 utga bvl -> deed/dood, zuun/baruun*/
    }

    .c{
      padding: 5px 10px 15px 20px; /*4 utga bvl -> deed tal, baruun, dood tal, zuun */
    }

    .d1{
      padding-top: 20px; /* elementiin deeed taliin dotorh zaig tohiruulna*/}
    .d2{
    padding-right: 30px; /* elementiin baruun taliin dotorh zaig tohiruulna*/}
    .d3{
    padding-bottom: 10px; /* elementiin dood taliin dotorh zaig tohiruulna*/}
    .d4{
    padding-left: 40px;/* elementiin zuun taliin dotorh zaig tohiruulna*/
    }
  </style>
</head>
<body>

  <div class="box a">padding: 20px;</div>
  <div class="box b">padding: 10px 30px;</div>
  <div class="box c">padding: 5px 10px 15px 20px;</div>

  <div class="box d1">padding-top: 20px;</div>
  <div class="box d2">padding-right: 30px;</div>
  <div class="box d3">padding-bottom: 10px;</div>
  <div class="box d4">padding-left: 40px;</div>

</body>
</html>
