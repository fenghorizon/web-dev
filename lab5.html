<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My first webpage</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#f3f4f6;
font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

.open-modal-btn{
margin:20px;
}

.header .open-modal-btn{
flex:1;
width:100%;
margin:0;
}

/* HEADER */

.header{
background:#1f2937;
padding:15px;
display:flex;
gap:12px;
}

.header a{
flex:1;
text-decoration:none;
}

.header button{
width:100%;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
padding:10px;
font-size:15px;
font-weight:600;
cursor:pointer;
}

.header button:hover{
background:#1d4ed8;
}

/* MAIN */

.main{
display:flex;
min-height:500px;
}

/* SIDEBAR */

.sidebar{
width:30%;
background:#e5e7eb;
padding:20px;
}

.profile-photo{
width:100%;
max-width:220px;
height:220px;
object-fit:cover;
border-radius:12px;
border:3px solid white;
margin-bottom:10px;
}

/* CONTENT */

.content{
width:70%;
background:white;
display:flex;
flex-direction:column;
}

/* IFRAME */

.content iframe{
flex:1;
width:100%;
border:1px solid #ccc;
}

/* FOOTER */

.footer{
background:#111827;
color:#e5e7eb;
padding:15px;
font-size:18px;
}

/* MODAL FORM */

.modal-dialog.custom-modal{
max-width:560px;
margin:24px auto;
}

.modal-content{
border-radius:18px;
overflow:hidden;
border:none;
box-shadow:0 18px 40px rgba(15, 23, 42, 0.22);
}

.modal-header{
background:linear-gradient(135deg, #111827, #1f2937);
color:white;
padding:18px 24px;
}

.modal-body{
padding:20px;
background:#f8fafc;
}

.modal-footer{
padding:14px 20px;
background:#ffffff;
border-top:1px solid #e5e7eb;
}

.contact-field{
margin-bottom:0;
padding:14px;
border-radius:16px;
height:100%;
}

.field-green{
background:#58ef8a;
}

.field-blue{
background:#79b5f2;
}

.field-red{
background:#ff5a5f;
}

.field-gray{
background:#d9d9d9;
}

.contact-field .form-label{
font-weight:700;
color:#111827;
margin-bottom:8px;
}

.contact-field .form-control{
padding:10px 12px;
border-radius:12px;
border:none;
background:rgba(255, 255, 255, 0.95);
box-shadow:none;
}

.contact-field textarea.form-control{
min-height:110px;
resize:vertical;
}

.modal-layout{
--bs-gutter-x:14px;
--bs-gutter-y:14px;
}

@media (min-width:768px){

.desktop-message-space{
margin-bottom:56px;
}

}

.modal-footer .btn{
border-radius:999px;
padding:10px 20px;
font-weight:600;
border:none;
}

.modal-footer .btn-secondary{
background:#d1d5db;
color:#111827;
}

.modal-footer .btn-primary{
background:#4f46e5;
}

/* TABLET */

@media (max-width:1024px){

.header{
display:flex;
flex-wrap:wrap;
gap:12px;
}

.header a,
.header .open-modal-btn{
flex:1 1 180px;
}

.main{
flex-direction:row;
}

.sidebar{
width:50%;
}

.content{
width:50%;
}

.modal-dialog.custom-modal{
max-width:520px;
}

}

/* MOBILE */

@media (max-width:600px){

.header{
grid-template-columns:1fr 1fr;
}

.main{
flex-direction:column;
}

.sidebar{
width:100%;
}

.content{
width:100%;
min-height:300px;
}

.content iframe{
min-height:300px;
}

.profile-photo{
max-width:150px;
height:200px;
}

.open-modal-btn{
margin:16px;
}

.header .open-modal-btn{
margin:0;
}

.modal-dialog.custom-modal{
max-width:88%;
margin:8px auto;
}

.modal-body{
padding:12px;
}

.modal-header{
padding:14px 16px;
}

.modal-footer{
padding:10px 12px;
}

.contact-field{
padding:10px;
}

.contact-field .form-label{
font-size:14px;
margin-bottom:6px;
}

.contact-field .form-control{
padding:8px 10px;
font-size:14px;
}

.contact-field textarea.form-control{
min-height:80px;
}

}

</style>

</head>

<body>

<div class="header">

<a href="lab1.html" target="web">
<button>Main page</button>
</a>

<a href="zurag.html" target="web">
<button>Pictures</button>
</a>

<a href="bicleg.html" target="web">
<button>Videos</button>
</a>

<a href="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d806.3108335185265!2d106.86427745450378!3d47.915963109475896!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x5d9692de499f537b%3A0x566b64eea30f2299!2sWV87%2B9JH%2C%20BGD%20-%206%20khoroo%2C%20Ulaanbaatar%2016081!5e0!3m2!1sen!2smn!4v1770778769325!5m2!1sen!2smn" target="web">
                <button>Map</button>
</a>

<!-- Button trigger modal -->
<button type="button" class="btn btn-primary open-modal-btn" data-bs-toggle="modal" data-bs-target="#exampleModal">
  Demo modal
</button>

</div>

<div class="main">

<div class="sidebar">

<img src="profile.jpg" class="profile-photo">

<h2>Emu-Ujin Ganbaatar</h2>

<p>Ui/Ux student</p>
<p>Ulaanbaatar, Mongolia</p>
<p>Student code: B25FM1031</p>
<p>Email: b25fm1031@ufe.edu.mn</p>

<ul>
<li>Learning HTML and CSS</li>
<li>Interested in many things</li>
</ul>

</div>

<div class="content">

<iframe src="" name="web"></iframe>

</div>

</div>


<!-- Modal -->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog custom-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLabel">Contact Form</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="contactForm">
          <div class="row modal-layout">
            <div class="col-6 col-md-3">
              <div class="contact-field field-green">
                <label for="studentName" class="form-label">Name</label>
                <input type="text" class="form-control" id="studentName" placeholder="Enter your name">
              </div>
            </div>

            <div class="col-6 col-md-3">
              <div class="contact-field field-green">
                <label for="studentEmail" class="form-label">Email</label>
                <input type="email" class="form-control" id="studentEmail" placeholder="Enter your email">
              </div>
            </div>

            <div class="col-12 col-md-6">
              <div class="contact-field field-blue">
                <label for="studentPhone" class="form-label">Phone</label>
                <input type="tel" class="form-control" id="studentPhone" placeholder="Enter your phone number">
              </div>
            </div>

            <div class="col-12 col-md-6">
              <div class="contact-field field-red">
                <label for="studentSubject" class="form-label">Subject</label>
                <input type="text" class="form-control" id="studentSubject" placeholder="Enter a subject">
              </div>
            </div>

            <div class="col-6 col-md-6">
              <div class="contact-field field-red">
                <label for="studentDepartment" class="form-label">Department</label>
                <input type="text" class="form-control" id="studentDepartment" placeholder="Enter your department">
              </div>
            </div>

            <div class="col-6 col-md-12 desktop-message-space">
              <div class="contact-field field-gray">
                <label for="studentMessage" class="form-label">Message</label>
                <input type="text" class="form-control" id="studentMessage" placeholder="Write your message">
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="submit" form="contactForm" class="btn btn-primary">Submit</button>
      </div>
    </div>
  </div>
</div>

<div class="footer">
Home Address: BGD - 30 khoroo, Ulaanbaatar 16081, Mongolia
</div>
<script src="modal.js"> </script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
