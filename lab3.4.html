<!DOCTYPE html>
<html>
<head>
  <title>CSS Border and Outline example</title>

  <style>
    body{
      font-family: Arial;
    }

    .box{
      margin: 10px;           
      padding: 15px;         
      background-color: #eee; 
      width: 320px; 
    }

    /* border jishee */
    .b1{
      border: 2px solid black; /* urgun, turul, ungu */
    }

    .b2{
      border: 3px dashed blue; /* tasarhai shugaman border */
    }

    /* outline jishee */
    .o1{
      border: 2px solid black; /* dotor border */
      outline: 3px solid red;  /* gadna tald outline */
    }

    .o2{
      border: 2px solid black;
      outline: 3px dashed green;
      outline-offset: -10px;     /* outline-g border-oos holduulna */
    }
  </style>
</head>
<body>
  <div class="box b1">border: 2px solid black;</div>
  <div class="box b2">border: 3px dashed blue;</div>

  <div class="box o1">outline: 3px solid red;</div>
  <div class="box o2">outline: 3px dashed green; outline-offset: 6px;</div>
</body>
</html>
