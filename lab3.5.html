<!DOCTYPE html>
<html>
<head>
  <title>CSS Opacity example</title>
  <style>
    body{
      font-family: Arial;
      background-image: url("/profile.jpg");
    }

    .box{
      margin: 10px;
      padding: 15px;
      background-color: blue;
      color: white;
    }

    .o1{
      opacity: 1; /* Buren haradah*/
    }

    .o2{
      opacity: 0.7;/* Hagas haragdah*/
    }

    .o3{
      opacity: 0.4; /* Baga haragdah*/
    }

    .o4{
      opacity: 0.2; /* Mash baga haragdah*/
    }
  </style>
</head>
<body>

  <div class="box o1">opacity: 1;</div>
  <div class="box o2">opacity: 0.7;</div>
  <div class="box o3">opacity: 0.4;</div>
  <div class="box o4">opacity: 0.2;</div>

</body>
</html>
