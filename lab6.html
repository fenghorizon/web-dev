<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Responsive Modal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  .box { height: 60px; border-radius: 12px; }
  .green { background: #4ade80; }
  .blue { background: #60a5fa; }
  .red { background: #ef4444; }
  .gray { background: #d1d5db; }
</style>
</head>

<body class="bg-black text-center text-white">

<div class="container mt-5">
  <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modal">
    Open Layout
  </button>
</div>

<!-- MODAL -->
<div class="modal fade" id="modal">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content p-3">

      <div class="modal-body">

        <!-- ROW -->
        <div class="row g-3">

          <!-- Top small boxes -->
          <div class="col-6 col-md-3">
            <div class="box green"></div>
          </div>
          <div class="col-6 col-md-3">
            <div class="box green"></div>
          </div>

          <!-- Blue (mobile full / desktop right) -->
          <div class="col-12 col-md-6">
            <div class="box blue"></div>
          </div>

          <!-- Red row -->
          <div class="col-12 col-md-6">
            <div class="box red"></div>
          </div>
          <div class="col-6 col-md-6">
            <div class="box red"></div>
          </div>

          <!-- Bottom gray -->
          <div class="col-6 col-md-12">
            <div class="box gray"></div>
          </div>

        </div>

      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
