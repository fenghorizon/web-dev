<!DOCTYPE html>
<html>
<head>
  <title>CSS Margin example</title>
<style>
div {
  border: 1px solid black; 
  margin-top: 50px; /* margin top gdg n elementiin deeed zahiin zaig tohiruulna*/
  margin-bottom: 50px; /* margin-bottom gedeg n elementiin dood zahiin zaig tohiruulna*/
  margin-right: 50px; /*margin-right gedeg n elementiin baruun zahiin zaig tohiruulna*/
  margin-left: 50px; /*margin-left gedeg n elementiin zuun zahiin zaig tohiruulna*/
  background-color: lightblue;
  /* margin: 50px;                -> 4 talaas 50px
     margin: 20px 40px;           -> deer/door 20, baruun/zuun 40
     margin: 10px 20px 30px 40px; -> deed tal, baruun tal, dood tal, zuun tal*/
} 

</style>
</head>
<body>
<h2>Using individual margin properties</h2>

<div>This div element has a top margin of 50px, a right margin of 50px, a bottom margin of 50px, and a left margin of 50px.</div>

</body>
</html>
